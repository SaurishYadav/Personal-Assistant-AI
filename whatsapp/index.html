<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp</title>
  <link rel="stylesheet" href="whatsapp.css" />
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <span class="logo-icon">💬</span>
        <span class="logo-text">WhatsApp</span>
      </div>
    </div>
    <div class="header-icons">
      <span>🔍</span>
      <span>⋮</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('chats')">CHATS</button>
    <button class="tab" onclick="showTab('contacts')">CONTACTS</button>
    <button class="tab" onclick="showTab('send')">NEW MESSAGE</button>
  </div>

  <!-- Chats Tab -->
  <div class="tab-content" id="chatsTab">
    <div class="chats-list" id="chatsList">
      <div class="empty-state">
        <div class="empty-emoji">💬</div>
        <div class="empty-text">No messages yet</div>
        <div class="empty-sub">Ask your AI Assistant to send a message!</div>
      </div>
    </div>
  </div>

  <!-- Contacts Tab -->
  <div class="tab-content hidden" id="contactsTab">
    <div class="contacts-list" id="contactsList"></div>
  </div>

  <!-- Send Message Tab -->
  <div class="tab-content hidden" id="sendTab">
    <div class="send-section">
      <div class="send-title">Send a Message</div>

      <div class="form-group">
        <label>To:</label>
        <select id="contactSelect">
          <option value="">Select contact...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Message:</label>
        <textarea id="messageInput" placeholder="Type your message here..." rows="4"></textarea>
      </div>

      <button class="send-btn" onclick="sendMessageNow()">
        Send Message 📤
      </button>
    </div>
  </div>

  <!-- Chat Window -->
  <div class="chat-window" id="chatWindow" style="display:none">
    <div class="chat-header">
      <button class="back-chat-btn" onclick="closeChatWindow()">←</button>
      <div class="chat-avatar" id="chatAvatar"></div>
      <div class="chat-info">
        <div class="chat-name" id="chatName"></div>
        <div class="chat-status">online</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <input type="text" id="chatInput" placeholder="Type a message..." />
      <button onclick="sendChatMessage()">➤</button>
    </div>
  </div>

  <!-- Popup -->
  <div class="popup" id="popup">
    <div class="popup-inner">
      <div class="popup-emoji">✅</div>
      <div class="popup-title">Message Sent!</div>
      <div class="popup-msg" id="popupMsg"></div>
      <button class="popup-btn" onclick="closePopup()">OK</button>
    </div>
  </div>

  <!-- Back to Assistant -->
  <a href="../index.html" class="back-btn">⬅ Back to Assistant</a>

  <script src="../shared/store.js"></script>
  <script src="../shared/bridge.js"></script>
  <script src="whatsapp.js"></script>
</body>
</html>
